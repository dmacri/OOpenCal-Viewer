name: Build OOpenCal-Visualiser AppImage (All-in-One with Compiler)

on:
  push:
    branches:
      - '**'
  release:
    types: [created]

env:
  PROJECT_NAME: OOpenCal-Viewer

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      ################### checkout & dependencies ###################
      - name: Checkout main repository
        uses: actions/checkout@v3

      - name: Checkout OOpenCAL dependency
        uses: actions/checkout@v3
        with:
          repository: alessioderango/OOpenCAL
          path: deps/OOpenCAL
          token: ${{ secrets.VisualizerOpenCal }}

      ################### environment & build tools ###################
      - name: Install build prerequisites (including Clang toolchain)
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends \
            cmake \
            ninja-build \
            clang \
            lld \
            llvm \
            libc++-dev \
            libc++abi-dev \
            libclang-common-18-dev \
            libclang1-18 \
            libstdc++-14-dev \
            libc6-dev \
            linux-libc-dev \
            qtbase5-dev \
            qttools5-dev \
            qttools5-dev-tools \
            libvtk9-dev \
            libvtk9-qt-dev \
            libfreetype-dev \
            libeigen3-dev \
            libtiff-dev \
            libpng-dev \
            libjpeg-dev \
            zlib1g-dev \
            libgl1-mesa-dev \
            libglu1-mesa-dev \
            patchelf \
            file \
            wget

      ################### build application (using Clang) ###################
      - name: Configure CMake with Clang
        run: |
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_BUILD_TYPE=Release \
            -DOOPENCAL_DIR=${{ github.workspace }}/deps \
            -DCMAKE_INSTALL_PREFIX=/usr

      - name: Build application
        run: |
          cd build
          cmake --build . --parallel $(nproc)

      - name: Install to temporary directory
        run: |
          cd build
          DESTDIR=${{ github.workspace }}/AppDir cmake --install .

      ################### prepare AppDir structure ###################
      - name: Create AppDir structure
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/lib
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          mkdir -p AppDir/usr/include
          mkdir -p AppDir/usr/libexec/clang
          mkdir -p AppDir/compiler/bin
          mkdir -p AppDir/compiler/lib
          mkdir -p AppDir/compiler/include

          # Copy main executable
          cp build/${PROJECT_NAME} AppDir/usr/bin/ || \
          cp AppDir/usr/bin/${PROJECT_NAME} AppDir/usr/bin/ || true

      - name: Copy Clang toolchain
        run: |
          # Copy Clang compiler binaries
          for binary in clang clang++ clang-18 clang++-18 lld lld-link llvm-ar llvm-ranlib; do
            if command -v $binary &> /dev/null; then
              BINARY_PATH=$(which $binary)
              cp "$BINARY_PATH" AppDir/compiler/bin/ || true
            fi
          done

          # Create symlinks for convenience
          cd AppDir/compiler/bin
          ln -sf clang cc 2>/dev/null || true
          ln -sf clang gcc 2>/dev/null || true
          ln -sf clang++ g++ 2>/dev/null || true
          ln -sf clang++ c++ 2>/dev/null || true
          cd -

      - name: Copy Clang resource headers
        run: |
          RESOURCE_DIR=$(clang -print-resource-dir 2>/dev/null || true)
          if [ -n "$RESOURCE_DIR" ] && [ -d "$RESOURCE_DIR" ]; then
            mkdir -p AppDir/compiler/lib/clang
            cp -r "$RESOURCE_DIR" AppDir/compiler/lib/clang/ 2>/dev/null || true
            if [ -d "$RESOURCE_DIR/include" ]; then
              mkdir -p AppDir/compiler/include/clang
              cp -r "$RESOURCE_DIR/include" AppDir/compiler/include/clang/ 2>/dev/null || true
            fi
          fi

      - name: Copy system headers
        run: |
          # Copy standard C headers
          if [ -d "/usr/include/x86_64-linux-gnu" ]; then
            mkdir -p AppDir/compiler/include/x86_64-linux-gnu
            cp -r /usr/include/x86_64-linux-gnu/* AppDir/compiler/include/x86_64-linux-gnu/ 2>/dev/null || true
          fi

          # Copy standard C/C++ headers
          for header_dir in /usr/include; do
            if [ -d "$header_dir" ]; then
              for header in "$header_dir"/*.h "$header_dir"/*.hpp; do
                [ -f "$header" ] && cp "$header" AppDir/compiler/include/ 2>/dev/null || true
              done

              # Copy important subdirectories
              for subdir in sys bits gnu c++ linux asm asm-generic net arpa; do
                if [ -d "$header_dir/$subdir" ]; then
                  mkdir -p AppDir/compiler/include/$subdir
                  cp -r "$header_dir/$subdir"/* AppDir/compiler/include/$subdir/ 2>/dev/null || true
                fi
              done
            fi
          done

          # Copy libstdc++ headers
          if [ -d "/usr/include/c++" ]; then
            mkdir -p AppDir/compiler/include/c++
            cp -r /usr/include/c++/* AppDir/compiler/include/c++/ 2>/dev/null || true
          fi

      - name: Copy project headers
        run: |
          # Copy headers from project directories with directory structure
          mkdir -p AppDir/usr/include/core
          mkdir -p AppDir/usr/include/data
          mkdir -p AppDir/usr/include/plugins
          mkdir -p AppDir/usr/include/utilities
          mkdir -p AppDir/usr/include/visualiser
          mkdir -p AppDir/usr/include/visualiserProxy
          mkdir -p AppDir/compiler/include/oopencal-viewer

          # Copy all headers from core/
          if [ -d "core" ]; then
            cp -r core/* AppDir/usr/include/core/ 2>/dev/null || true
            cp -r core/* AppDir/compiler/include/oopencal-viewer/ 2>/dev/null || true
          fi

          # Copy all headers from data/
          if [ -d "data" ]; then
            cp -r data/* AppDir/usr/include/data/ 2>/dev/null || true
            cp -r data/* AppDir/compiler/include/oopencal-viewer/ 2>/dev/null || true
          fi

          # Copy all headers from plugins/
          if [ -d "plugins" ]; then
            cp -r plugins/* AppDir/usr/include/plugins/ 2>/dev/null || true
            cp -r plugins/* AppDir/compiler/include/oopencal-viewer/ 2>/dev/null || true
          fi

          # Copy all headers from utilities/
          if [ -d "utilities" ]; then
            cp -r utilities/* AppDir/usr/include/utilities/ 2>/dev/null || true
            cp -r utilities/* AppDir/compiler/include/oopencal-viewer/ 2>/dev/null || true
          fi

          # Copy all headers from visualiser/
          if [ -d "visualiser" ]; then
            cp -r visualiser/* AppDir/usr/include/visualiser/ 2>/dev/null || true
            cp -r visualiser/* AppDir/compiler/include/oopencal-viewer/ 2>/dev/null || true
          fi

          # Copy all headers from visualiserProxy/
          if [ -d "visualiserProxy" ]; then
            cp -r visualiserProxy/* AppDir/usr/include/visualiserProxy/ 2>/dev/null || true
            cp -r visualiserProxy/* AppDir/compiler/include/oopencal-viewer/ 2>/dev/null || true
          fi

      - name: Copy OOpenCAL headers
        run: |
          # Copy OOpenCAL headers (required for plugin compilation)
          if [ -d "deps/OOpenCAL" ]; then
            mkdir -p AppDir/usr/include/OOpenCAL/base
            mkdir -p AppDir/compiler/include/OOpenCAL/base
            cp -r deps/OOpenCAL/base/* AppDir/usr/include/OOpenCAL/base/ 2>/dev/null || true
            cp -r deps/OOpenCAL/base/* AppDir/compiler/include/OOpenCAL/base/ 2>/dev/null || true
          fi

      - name: Copy VTK headers
        run: |
          # Copy VTK headers with both VTK-version-specific and standard paths
          if [ -d "/usr/include/vtk-9.1" ]; then
            mkdir -p AppDir/usr/include/vtk
            mkdir -p AppDir/compiler/include/vtk
            cp -r /usr/include/vtk-9.1/* AppDir/usr/include/vtk/ 2>/dev/null || true
            cp -r /usr/include/vtk-9.1/* AppDir/compiler/include/vtk/ 2>/dev/null || true
          elif [ -d "/usr/include/vtk" ]; then
            mkdir -p AppDir/compiler/include/vtk
            cp -r /usr/include/vtk AppDir/compiler/include/ 2>/dev/null || true
          fi

      - name: Copy compiler runtime libraries
        run: |
          # Copy libclang-cpp (required by clang++) - follow symlinks to real files
          for lib in /usr/lib/llvm-*/lib/libclang-cpp.so* /usr/lib/x86_64-linux-gnu/libclang-cpp.so*; do
            [ -f "$lib" ] && cp -L "$lib" AppDir/compiler/lib/ 2>/dev/null || true
          done

          # Copy Clang runtime libraries
          CLANG_LIB_PATHS=$(find /usr/lib/x86_64-linux-gnu -path "*clang*" -name "*.so*" -type f)
          for lib in $CLANG_LIB_PATHS; do
            cp -L "$lib" AppDir/compiler/lib/ 2>/dev/null || true
          done

          # Copy LLVM runtime libraries
          LLVM_LIB_PATHS=$(find /usr/lib/x86_64-linux-gnu /usr/lib/llvm-* -path "*llvm*" -name "*.so*" -type f)
          for lib in $LLVM_LIB_PATHS; do
            cp -L "$lib" AppDir/compiler/lib/ 2>/dev/null || true
          done

          # Ensure libLLVM from versioned llvm dirs
          for lib in /usr/lib/llvm-*/lib/libLLVM.so*; do
            [ -f "$lib" ] && cp -L "$lib" AppDir/compiler/lib/ 2>/dev/null || true
          done

          # Copy libstdc++ and libc++ runtime
          for lib in /usr/lib/x86_64-linux-gnu/libstdc++.so* /usr/lib/x86_64-linux-gnu/libc++.so* /usr/lib/x86_64-linux-gnu/libc++abi.so*; do
            [ -f "$lib" ] && cp -L "$lib" AppDir/compiler/lib/ || true
          done

          # Copy libgomp (OpenMP) if available
          for lib in /usr/lib/x86_64-linux-gnu/libgomp.so*; do
            [ -f "$lib" ] && cp -L "$lib" AppDir/compiler/lib/ || true
          done

      - name: Copy Qt libraries
        run: |
          # Find Qt library path
          QT_LIB_PATH=$(qmake -query QT_INSTALL_LIBS)

          # Copy essential Qt libraries
          for lib in Core Gui Widgets OpenGL DBus XcbQpa; do
            cp -P ${QT_LIB_PATH}/libQt5${lib}.so* AppDir/usr/lib/ 2>/dev/null || true
          done

          # Copy Qt plugins
          QT_PLUGINS=$(qmake -query QT_INSTALL_PLUGINS)
          mkdir -p AppDir/usr/plugins
          cp -r ${QT_PLUGINS}/platforms AppDir/usr/plugins/ 2>/dev/null || true
          cp -r ${QT_PLUGINS}/xcbglintegrations AppDir/usr/plugins/ 2>/dev/null || true
          cp -r ${QT_PLUGINS}/imageformats AppDir/usr/plugins/ 2>/dev/null || true

      - name: "Diagnostics of ldd clang++"
        run: |
          echo "System clang++:"
          which clang++ || true
          ldd $(which clang++) || true
          echo "AppDir clang++ (with compiler lib path):"
          if [ -f "AppDir/compiler/bin/clang++" ]; then
            LD_LIBRARY_PATH="AppDir/compiler/lib" ldd AppDir/compiler/bin/clang++ || true
          fi

      - name: Copy VTK libraries
        run: |
          # Find and copy VTK libraries
          VTK_LIBS=$(find /usr/lib/x86_64-linux-gnu -name "libvtk*.so*" -type f)
          for lib in $VTK_LIBS; do
            cp -P $lib AppDir/usr/lib/ 2>/dev/null || true
          done

          # Copy VTK dependencies
          for lib in /usr/lib/x86_64-linux-gnu/libvtk*.so*; do
            [ -e "$lib" ] && cp -P "$lib" AppDir/usr/lib/ 2>/dev/null || true
          done

      - name: Copy system runtime dependencies
        run: |
          # Function to copy library and its dependencies
          copy_deps() {
            local binary=$1
            ldd "$binary" 2>/dev/null | grep "=> /" | awk '{print $3}' | while read lib; do
              if [ -f "$lib" ]; then
                # Skip some system libraries but be less strict for AppImage with compiler
                case "$lib" in
                  /lib/x86_64-linux-gnu/ld-linux*.so*|/lib64/ld-linux*.so*|/lib/x86_64-linux-gnu/libc.so*|/lib/x86_64-linux-gnu/libm.so*|/lib/x86_64-linux-gnu/libdl.so*|/lib/x86_64-linux-gnu/libpthread.so*|/lib/x86_64-linux-gnu/librt.so*|/lib/x86_64-linux-gnu/libutil.so*|/lib/x86_64-linux-gnu/libnsl.so*|/lib/x86_64-linux-gnu/libresolv.so*|/usr/lib/x86_64-linux-gnu/libc.so*|/usr/lib/x86_64-linux-gnu/libm.so*|/usr/lib/x86_64-linux-gnu/libdl.so*|/usr/lib/x86_64-linux-gnu/libpthread.so*|/usr/lib/x86_64-linux-gnu/librt.so*|/usr/lib/x86_64-linux-gnu/libutil.so*|/usr/lib/x86_64-linux-gnu/libnsl.so*|/usr/lib/x86_64-linux-gnu/libresolv.so*)
                    continue
                    ;;
                esac
                cp -n "$lib" AppDir/usr/lib/ 2>/dev/null || true
              fi
            done
          }

          # Copy dependencies for main executable
          copy_deps "AppDir/usr/bin/${PROJECT_NAME}"

          # Copy dependencies for Qt and VTK libraries
          for lib in AppDir/usr/lib/*.so*; do
            [ -f "$lib" ] && copy_deps "$lib"
          done

      - name: Copy additional development libraries
        run: |
          # Copy libz, libpng, libjpeg, libfreetype (often needed for modules)
          for lib in /usr/lib/x86_64-linux-gnu/libz.so* \
                     /usr/lib/x86_64-linux-gnu/libpng*.so* \
                     /usr/lib/x86_64-linux-gnu/libjpeg.so* \
                     /usr/lib/x86_64-linux-gnu/libfreetype.so* \
                     /usr/lib/x86_64-linux-gnu/libtiff.so* \
                     /usr/lib/x86_64-linux-gnu/libGL.so* \
                     /usr/lib/x86_64-linux-gnu/libGLU.so* \
                     /usr/lib/x86_64-linux-gnu/libX11.so* \
                     /usr/lib/x86_64-linux-gnu/libxcb.so*; do
            [ -f "$lib" ] && cp -P "$lib" AppDir/compiler/lib/ 2>/dev/null || true
          done

      - name: Remove bundled glibc (AppImage compatibility)
        run: |
          rm -f AppDir/usr/lib/libc.so* AppDir/usr/lib/libm.so* AppDir/usr/lib/libdl.so* AppDir/usr/lib/libpthread.so* \
                AppDir/usr/lib/librt.so* AppDir/usr/lib/libutil.so* AppDir/usr/lib/libnsl.so* AppDir/usr/lib/libresolv.so* \
                AppDir/usr/lib/ld-linux*.so* AppDir/usr/lib/ld-linux-x86-64.so* 2>/dev/null || true
          rm -f AppDir/compiler/lib/libc.so* AppDir/compiler/lib/libm.so* AppDir/compiler/lib/libdl.so* AppDir/compiler/lib/libpthread.so* \
                AppDir/compiler/lib/librt.so* AppDir/compiler/lib/libutil.so* AppDir/compiler/lib/libnsl.so* AppDir/compiler/lib/libresolv.so* \
                AppDir/compiler/lib/ld-linux*.so* AppDir/compiler/lib/ld-linux-x86-64.so* 2>/dev/null || true

      ################### icons and desktop entry ###################
      - name: Prepare application icon
        run: |
          if [ -f icons/application.png ]; then
            cp icons/application.png AppDir/usr/share/icons/hicolor/256x256/apps/${PROJECT_NAME}.png
            cp icons/application.png AppDir/${PROJECT_NAME}.png
          else
            # Create a dummy icon if none exists
            convert -size 256x256 xc:blue AppDir/${PROJECT_NAME}.png 2>/dev/null || \
            touch AppDir/${PROJECT_NAME}.png
            cp AppDir/${PROJECT_NAME}.png AppDir/usr/share/icons/hicolor/256x256/apps/${PROJECT_NAME}.png 2>/dev/null || true
          fi

      - name: Create .desktop file
        run: |
          cat > AppDir/${PROJECT_NAME}.desktop << EOF
          [Desktop Entry]
          Name=${PROJECT_NAME}
          Exec=${PROJECT_NAME}
          Icon=${PROJECT_NAME}
          Type=Application
          Categories=Utility;Science;
          EOF

          cp AppDir/${PROJECT_NAME}.desktop AppDir/usr/share/applications/

      - name: Create AppRun script
        run: |
          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          APPIMAGE_REPACK="${HERE}"

          # Source compiler environment for modules (can be used by $APP_EXEC)
          export COMPILER_PATH="${HERE}/compiler/bin"
          export COMPILER_INCLUDEDIR="${HERE}/compiler/include"
          export COMPILER_LIBDIR="${HERE}/compiler/lib"
          export PATH="${HERE}/compiler/bin:${PATH}"
          export OOPENCAL_COMPILER="${HERE}/compiler/bin/clang++"

          # Library paths - app runtime
          export LD_LIBRARY_PATH="${HERE}/usr/lib:${HERE}/compiler/lib:${LD_LIBRARY_PATH}"

          # C/C++ header search paths for in-app module compilation
          export CLANG_RESOURCE_INCLUDE="${HERE}/compiler/include/clang/include"
          CXX_ROOT="${HERE}/compiler/include/c++"
          CXX_VER=""
          if [ -d "$CXX_ROOT" ]; then
            CXX_VER=$(ls -1v "$CXX_ROOT" | tail -n1)
          fi
          CXX_VER_DIR=""
          CXX_ARCH_DIR=""
          if [ -n "$CXX_VER" ] && [ -d "$CXX_ROOT/$CXX_VER" ]; then
            CXX_VER_DIR="$CXX_ROOT/$CXX_VER"
            if [ -d "$CXX_ROOT/$CXX_VER/x86_64-linux-gnu" ]; then
              CXX_ARCH_DIR="$CXX_ROOT/$CXX_VER/x86_64-linux-gnu"
            fi
          fi

          export CPATH="${CLANG_RESOURCE_INCLUDE}:${HERE}/compiler/include:${CPATH}"
          if [ -n "$CXX_VER_DIR" ]; then
            export CPATH="${CXX_VER_DIR}:${CXX_ARCH_DIR}:${CPATH}"
            export CPLUS_INCLUDE_PATH="${CXX_VER_DIR}:${CXX_ARCH_DIR}:${CLANG_RESOURCE_INCLUDE}:${HERE}/compiler/include:${CPLUS_INCLUDE_PATH}"
          else
            export CPLUS_INCLUDE_PATH="${CLANG_RESOURCE_INCLUDE}:${HERE}/compiler/include:${CPLUS_INCLUDE_PATH}"
          fi
          export C_INCLUDE_PATH="${CLANG_RESOURCE_INCLUDE}:${HERE}/compiler/include/x86_64-linux-gnu:${HERE}/compiler/include:${C_INCLUDE_PATH}"

          # Qt configuration
          export QT_PLUGIN_PATH="${HERE}/usr/plugins"
          export QT_QPA_PLATFORM_PLUGIN_PATH="${HERE}/usr/plugins/platforms"

          # Disable Qt's automatic high DPI scaling
          export QT_AUTO_SCREEN_SCALE_FACTOR=0

          # Compatibility: set paths for OOpenCAL and VTK
          export OOPENCAL_VIEWER_ROOT="${HERE}/compiler/include/oopencal-viewer"
          export OOPENCAL_DIR="${HERE}/compiler/include"
          export VTK_INCLUDES="${HERE}/compiler/include/vtk"

          # Make sure compiler can find libraries
          export LDFLAGS="-L${HERE}/compiler/lib"
          export LDLIBS="-L${HERE}/compiler/lib"
          export LIBRARY_PATH="${HERE}/compiler/lib:${LIBRARY_PATH}"
          export LD_RPATH_SEARCH_PATHS="${HERE}/compiler/lib:${HERE}/usr/lib"

          # Execute the application
          exec "${HERE}/usr/bin/___APP_EXECUTABLE_NAME___" "$@"
          EOF

          chmod +x AppDir/AppRun

      - name: Insert executable name into AppRun
        run: |
          sed -i "s|___APP_EXECUTABLE_NAME___|${PROJECT_NAME}|g" AppDir/AppRun

      - name: Fix RPATH for all binaries and libraries
        run: |
          # Fix RPATH for main executable
          patchelf --set-rpath '$ORIGIN/../lib:$ORIGIN/../../compiler/lib' AppDir/usr/bin/${PROJECT_NAME} 2>/dev/null || true

          # Fix RPATH for all libraries in usr/lib
          find AppDir/usr/lib -name "*.so*" -type f -exec \
            patchelf --set-rpath '$ORIGIN:$ORIGIN/../../compiler/lib' {} \; 2>/dev/null || true

          # Fix RPATH for compiler libraries
          find AppDir/compiler/lib -name "*.so*" -type f -exec \
            patchelf --set-rpath '$ORIGIN' {} \; 2>/dev/null || true

      ################### create AppImage ###################
      - name: Download appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Create AppImage
        run: |
          # Use --appimage-extract-and-run to work without FUSE in CI environment
          # Set ARCH explicitly to avoid architecture detection issues
          ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run AppDir ${PROJECT_NAME}-x86_64-allin.AppImage
          chmod +x ${PROJECT_NAME}-x86_64-allin.AppImage

      ################### artifacts ###################
      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-AppImage-AllInOne
          path: ${{ env.PROJECT_NAME }}-x86_64-allin.AppImage

      ################### release upload ###################
      - name: Upload AppImage to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.PROJECT_NAME }}-x86_64-allin.AppImage
