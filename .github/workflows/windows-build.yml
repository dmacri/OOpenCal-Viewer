name: Windows Build

on:
  push:
    branches:
      - '**'
  release:
    types: [created]

jobs:
  build-windows:
    runs-on: windows-latest
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - { build_type: "Debug", generator: "Visual Studio 17 2022" }
          - { build_type: "Release", generator: "Visual Studio 17 2022" }

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    ################### checkout OOpenCAL ###################
    - name: Checkout OOpenCAL dependency
      uses: actions/checkout@v4
      with:
        repository: alessioderango/OOpenCAL
        path: deps/OOpenCAL
        token: ${{ secrets.VisualizerOpenCal }}

    - name: Install CMake and Ninja
      uses: lukka/get-cmake@latest
      with:
        cmakeVersion: "~3.27"
        ninjaVersion: "^1.11"

    - name: Cache vcpkg and packages
      uses: actions/cache@v4
      with:
        path: |
          ${{ runner.temp }}/vcpkg
          C:\vcpkg
        key: vcpkg-vtk-${{ runner.os }}-x64-windows-v2
        restore-keys: |
          vcpkg-vtk-${{ runner.os }}-x64-windows-

    - name: Setup vcpkg
      shell: pwsh
      run: |
        # Clone vcpkg
        $vcpkg_root = "${{ runner.temp }}/vcpkg"
        if (-not (Test-Path $vcpkg_root)) {
          Write-Host "Cloning vcpkg..."
          git clone https://github.com/Microsoft/vcpkg.git --depth=1 "$vcpkg_root"
        } else {
          Write-Host "vcpkg already cached, skipping clone"
        }
        
        # Bootstrap vcpkg (only if not already done)
        $vcpkg_exe = Join-Path $vcpkg_root "vcpkg.exe"
        if (-not (Test-Path $vcpkg_exe)) {
          Write-Host "Bootstrapping vcpkg..."
          & "$vcpkg_root/bootstrap-vcpkg.bat" -disableMetrics
        } else {
          Write-Host "vcpkg already bootstrapped"
        }
        
        # Install VTK with Qt and OpenGL support
        Write-Host "Installing/updating VTK with Qt and OpenGL support..."
        & "$vcpkg_exe" install vtk[qt,opengl]:x64-windows --recurse
        
        # Make vcpkg root available for next steps
        Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_ROOT=$vcpkg_root"

    - name: Configure CMake
      shell: pwsh
      run: |
        $vcpkg_root = "${{ runner.temp }}/vcpkg"
        $toolchain_file = "$vcpkg_root/scripts/buildsystems/vcpkg.cmake"
        $project_root = $env:GITHUB_WORKSPACE
        $oopencal_dir = Join-Path $project_root "deps"
        
        Write-Host "Project root: $project_root"
        Write-Host "OOpenCAL parent (OOPENCAL_DIR): $oopencal_dir"
        
        mkdir -p build
        cd build
        
        cmake -G "${{ matrix.generator }}" `
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
          -DCMAKE_TOOLCHAIN_FILE="$toolchain_file" `
          -DOOPENCAL_DIR="$oopencal_dir" `
          -DUSE_QT6=ON `
          ..

    - name: Build project
      shell: pwsh
      run: |
        cd build
        cmake --build . --config ${{ matrix.build_type }} --target OOpenCal-Viewer

    - name: Package runtime (Qt + VTK)
      shell: pwsh
      run: |
        $vcpkg_root = "${{ runner.temp }}/vcpkg"
        $build_type = "${{ matrix.build_type }}"
        $exe_path = "build/$build_type/OOpenCal-Viewer.exe"
        $package_dir = "build/package/$build_type"
        
        New-Item -ItemType Directory -Force -Path $package_dir | Out-Null
        Copy-Item $exe_path $package_dir -Force
        
        $windeployqt = Get-ChildItem -Path "$vcpkg_root/installed/x64-windows" -Recurse -Filter windeployqt.exe | Select-Object -First 1
        if (-not $windeployqt) { throw "windeployqt.exe not found under vcpkg." }
        
        $deployArgs = @("--no-translations")
        if ($build_type -eq "Debug") { $deployArgs += "--debug" } else { $deployArgs += "--release" }
        & $windeployqt.FullName @deployArgs "$package_dir/OOpenCal-Viewer.exe"
        
        $applocal = Join-Path $vcpkg_root "scripts/buildsystems/msbuild/applocal.ps1"
        if (-not (Test-Path $applocal)) { throw "applocal.ps1 not found at $applocal" }
        
        $installedDir = Join-Path $vcpkg_root "installed/x64-windows/bin"
        if ($build_type -eq "Debug") { $installedDir = Join-Path $vcpkg_root "installed/x64-windows/debug/bin" }
        & $applocal -targetBinary "$package_dir/OOpenCal-Viewer.exe" -installedDir "$installedDir"
        
        Compress-Archive -Path "$package_dir/*" -DestinationPath "build/OOpenCal-Viewer-${{ matrix.build_type }}-windows.zip" -Force

    - name: Upload build artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: OOpenCal-Viewer-${{ matrix.build_type }}
        path: build/${{ matrix.build_type }}/OOpenCal-Viewer.exe

    - name: Upload packaged ZIP
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: OOpenCal-Viewer-${{ matrix.build_type }}-windows-zip
        path: build/OOpenCal-Viewer-${{ matrix.build_type }}-windows.zip
        if-no-files-found: warn
